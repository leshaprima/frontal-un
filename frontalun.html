<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ФРОНТАЛЬНАЯ КАМЕРА · 3D ЛАНДШАФТ · ЗАПИСЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #000;
            color: #0ff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }

        #cameraWrapper {
            width: 100%;
            height: 70vh;
            padding: 8px;
            background: #0a0a1a;
        }

        #addressCamera {
            width: 100%;
            height: 100%;
            border: 3px solid #00ffff;
            border-radius: 24px;
            background: #050510;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px #0ff;
        }

        #cameraCanvas {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background: #0a0a1a;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, #ff00ff, #00ffff, transparent);
            animation: scanMove 4s linear infinite;
            pointer-events: none;
            z-index: 15;
            opacity: 0.4;
        }

        @keyframes scanMove {
            0% { top: -2px; }
            100% { top: 100%; }
        }

        .camera-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f;
            z-index: 20;
            font-size: clamp(10px, 3vw, 14px);
            backdrop-filter: blur(5px);
        }

        #cameraLabel {
            color: #0ff;
            font-weight: bold;
        }

        #cameraStatus {
            color: #ff0;
        }

        .buttonPanel {
            width: 100%;
            padding: 16px 12px 24px;
            background: #000;
            border-top: 2px solid #ff00ff;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #00ffff;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            flex: 1 1 auto;
            min-width: 120px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .btn.portal {
            border-color: #ff00ff;
            color: #ff00ff;
        }

        .hidden { display: none; }
        
        #studio3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            display: none;
            background: #000;
            touch-action: none;
        }
        #studio3d.active {
            display: block;
        }
        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        #backFrom3d {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #00ffff;
            border-radius: 50%;
            color: #00ffff;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1001;
        }
        
        #recordBtn3d {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #111;
            border: 4px solid #ff0000;
            color: #ff0000;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1002;
            box-shadow: 0 0 30px #ff0000;
        }
        #recordBtn3d.recording {
            background: #ff0000;
            color: #fff;
            animation: pulse-record 1s infinite;
        }
        @keyframes pulse-record {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        #timer3d {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 2px solid #0ff;
            padding: 8px 20px;
            border-radius: 30px;
            color: #0ff;
            font-size: 24px;
            z-index: 1002;
        }
        
        #recordIndicator3d {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff0000;
            display: none;
            animation: blink 1s infinite;
            z-index: 1002;
        }
        
        #audioVisualizer {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 50px;
            background: #000;
            border: 2px solid #ffff00;
            border-radius: 25px;
            z-index: 1002;
            overflow: hidden;
        }
        
        #audioCanvas {
            width: 100%;
            height: 100%;
        }
        
        #audioQuality {
            position: absolute;
            bottom: 260px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff00;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #00ff00;
            z-index: 1003;
        }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        .hint {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff00;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            z-index: 1003;
        }

        .stats {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: #ff0;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 12px;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div id="cameraWrapper">
        <div id="addressCamera">
            <div class="camera-header">
                <span id="cameraLabel">📷 ФРОНТАЛЬНАЯ КАМЕРА</span>
                <span id="cameraStatus">АКТИВНА</span>
            </div>
            <canvas id="cameraCanvas"></canvas>
            <div class="scan-line"></div>
            <div class="stats">🪞 ЗЕРКАЛО ВСЕГДА ВКЛ</div>
        </div>
    </div>

    <div class="buttonPanel">
        <div class="row">
            <button class="btn portal" id="go3dBtn">🎬 В 3D ЛАНДШАФТ</button>
        </div>
    </div>

    <div id="studio3d">
        <canvas id="canvas3d"></canvas>
        <div id="backFrom3d">◀</div>
        
        <div id="recordBtn3d">⏺</div>
        <div id="timer3d">00:00</div>
        <div id="recordIndicator3d"></div>
        
        <div id="audioVisualizer">
            <canvas id="audioCanvas" width="300" height="50"></canvas>
        </div>
        
        <div id="audioQuality">🎵 АУДИО С КАМЕРЫ</div>
        <div class="hint">👆 ВРАЩАЙТЕ · ЗЕРКАЛО АКТИВНО</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    
    <script>
        (function() {
            // ЭЛЕМЕНТЫ
            const cameraCanvas = document.getElementById('cameraCanvas');
            const ctx = cameraCanvas.getContext('2d');
            const go3dBtn = document.getElementById('go3dBtn');
            const studio3d = document.getElementById('studio3d');
            const canvas3d = document.getElementById('canvas3d');
            const backFrom3d = document.getElementById('backFrom3d');
            const cameraLabel = document.getElementById('cameraLabel');
            const cameraStatus = document.getElementById('cameraStatus');
            
            const recordBtn3d = document.getElementById('recordBtn3d');
            const timer3d = document.getElementById('timer3d');
            const recordIndicator3d = document.getElementById('recordIndicator3d');
            const audioCanvas = document.getElementById('audioCanvas');
            const audioCtx = audioCanvas.getContext('2d');
            const audioQuality = document.getElementById('audioQuality');

            // НАСТРОЙКИ - как в первом коде
            const MAX_PARTICLES = 300000;
            const ZONE_WIDTH = 1200;
            const ZONE_HEIGHT = 720;
            const X_SCALE = 38;
            const Z_SCALE = 19;

            // ВИДЕО (только фронтальная камера)
            const video = document.createElement('video');
            video.crossOrigin = 'anonymous';
            video.loop = true;
            video.muted = false;
            video.playsInline = true;
            let videoActive = false;
            let cameraStream = null;

            // АУДИО
            let audioContext = null;
            let analyser = null;
            let audioSource = null;
            let audioActive = false;
            const audioData = new Uint8Array(256);

            // ЗАПИСЬ
            let mediaRecorder = null;
            let recordedChunks = [];
            let isRecording = false;
            let recordingTimer = null;
            let recordingSeconds = 0;

            // 3D переменные
            let scene, camera, renderer, points, controls;
            let positions, rxArray, ryArray;

            // ЗЕРКАЛО - всегда включено
            const mirrorMode = true;

            // ==================== ЗАПУСК ФРОНТАЛЬНОЙ КАМЕРЫ ====================
            async function startFrontCamera() {
                try {
                    if (cameraStream) {
                        cameraStream.getTracks().forEach(track => track.stop());
                    }

                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: 'user',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: true
                    });
                    
                    cameraStream = stream;
                    
                    if (video.srcObject) {
                        video.pause();
                    }
                    
                    video.srcObject = stream;
                    await video.play();
                    
                    videoActive = true;
                    
                    cameraLabel.textContent = '📷 ФРОНТАЛЬНАЯ КАМЕРА';
                    cameraStatus.textContent = 'АКТИВНА';
                    
                    // Настройка аудио
                    setupCameraAudio(stream);
                    
                } catch (e) {
                    alert('Ошибка доступа к камере: ' + e.message);
                    cameraLabel.textContent = '📷 КАМЕРА НЕ ДОСТУПНА';
                    cameraStatus.textContent = 'ОШИБКА';
                }
            }

            // ==================== НАСТРОЙКА АУДИО ====================
            async function setupCameraAudio(stream) {
                try {
                    if (audioContext) {
                        await audioContext.close();
                    }
                    
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 48000,
                        latencyHint: 'balanced'
                    });
                    
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 512;
                    analyser.smoothingTimeConstant = 0.8;
                    
                    audioSource = audioContext.createMediaStreamSource(stream);
                    audioSource.connect(analyser);
                    
                    // Не подключаем к динамикам, чтобы не было эха
                    // analyser.connect(audioContext.destination);
                    
                    audioActive = true;
                    audioQuality.innerHTML = '🎵 АУДИО С КАМЕРЫ · 48 kHz';
                    
                } catch (e) {
                    console.error('Audio setup error:', e);
                    audioQuality.innerHTML = '🎵 АУДИО: ОШИБКА';
                }
            }

            // ==================== 2D ОТРИСОВКА ====================
            function resizeCamera() {
                const rect = document.getElementById('addressCamera').getBoundingClientRect();
                cameraCanvas.width = rect.width;
                cameraCanvas.height = rect.height;
            }
            window.addEventListener('resize', resizeCamera);
            resizeCamera();

            function drawCamera() {
                if (!ctx) return;
                const w = cameraCanvas.width;
                const h = cameraCanvas.height;

                if (videoActive && video.readyState >= 2) {
                    // Зеркало всегда включено
                    ctx.save();
                    ctx.translate(w, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, w, h);
                    ctx.restore();
                    
                    ctx.fillStyle = '#00ffff80';
                    ctx.font = 'bold 14px Courier New';
                    ctx.fillText('🪞 ЗЕРКАЛО', 20, 30);
                    
                } else {
                    ctx.fillStyle = '#0a0a1a';
                    ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#00ffff33';
                    ctx.font = '20px Courier New';
                    ctx.fillText('ЗАПУСК КАМЕРЫ...', w/2-80, h/2);
                }
                requestAnimationFrame(drawCamera);
            }
            drawCamera();

            // ==================== 3D ИНИЦИАЛИЗАЦИЯ (ИЗ ПЕРВОГО КОДА) ====================
            function init3D() {
                if (scene) return;

                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x050510);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(45, 25, 100);
                camera.lookAt(0, 8, 0);

                renderer = new THREE.WebGLRenderer({ 
                    canvas: canvas3d, 
                    preserveDrawingBuffer: true,
                    antialias: true
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.rotateSpeed = 1.0;
                controls.enableZoom = true;
                controls.enablePan = true;
                controls.maxPolarAngle = Math.PI;
                controls.minPolarAngle = 0;

                // Генерация частиц (как в первом коде - плоский ландшафт)
                rxArray = new Float32Array(MAX_PARTICLES);
                ryArray = new Float32Array(MAX_PARTICLES);
                positions = new Float32Array(MAX_PARTICLES * 3);

                for (let i = 0; i < MAX_PARTICLES; i++) {
                    const rx = (Math.random() - 0.5) * ZONE_WIDTH;
                    const ry = (Math.random() - 0.5) * ZONE_HEIGHT;
                    
                    rxArray[i] = rx;
                    ryArray[i] = ry;
                    
                    const i3 = i * 3;
                    positions[i3] = rx / X_SCALE;
                    positions[i3 + 1] = 0; // Плоский ландшафт
                    positions[i3 + 2] = ry / Z_SCALE;
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('rx', new THREE.BufferAttribute(rxArray, 1));
                geometry.setAttribute('ry', new THREE.BufferAttribute(ryArray, 1));

                // Шейдеры из первого кода
                const vertexShader = `
                    attribute float rx;
                    attribute float ry;
                    varying vec2 vUv;
                    
                    void main() {
                        float uvX = (rx / 1200.0) + 0.5;
                        float uvY = 1.0 - ((ry / 720.0) + 0.5);
                        
                        // Зеркало всегда включено для фронтальной камеры
                        uvX = 1.0 - uvX;
                        
                        vUv = vec2(uvX, uvY);
                        
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_Position = projectionMatrix * mvPosition;
                        gl_PointSize = 8.0; // Размер точек как в первом коде
                    }
                `;

                const fragmentShader = `
                    uniform sampler2D videoTexture;
                    uniform float audioBoost;
                    varying vec2 vUv;
                    
                    void main() {
                        vec4 color = texture2D(videoTexture, vUv);
                        
                        // Аудио-буст яркости как в первом коде (0.8)
                        color.rgb *= (1.0 + audioBoost * 0.8);
                        
                        // Низкий порог отбраковки как в первом коде
                        if (color.r + color.g + color.b < 0.01) {
                            discard;
                        }
                        
                        vec2 center = gl_PointCoord - 0.5;
                        if (dot(center, center) > 0.25) discard;
                        
                        gl_FragColor = color;
                    }
                `;

                const material = new THREE.ShaderMaterial({
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    uniforms: {
                        videoTexture: { value: new THREE.VideoTexture(video) },
                        audioBoost: { value: 0.0 }
                    }
                });

                points = new THREE.Points(geometry, material);
                scene.add(points);
            }

            // ==================== ВИЗУАЛИЗАЦИЯ АУДИО ====================
            function drawAudioVisualizer() {
                if (!audioActive || !analyser) {
                    audioCtx.fillStyle = '#000';
                    audioCtx.fillRect(0, 0, 300, 50);
                    return;
                }
                
                analyser.getByteFrequencyData(audioData);
                
                audioCtx.fillStyle = '#000';
                audioCtx.fillRect(0, 0, 300, 50);
                
                const barWidth = 300 / 64;
                for (let i = 0; i < 64; i++) {
                    const value = audioData[i] / 255;
                    const height = value * 50;
                    audioCtx.fillStyle = `hsl(${value * 360}, 100%, 50%)`;
                    audioCtx.fillRect(i * barWidth, 50 - height, barWidth - 1, height);
                }
                
                if (points) {
                    let sum = 0;
                    for (let i = 0; i < 50; i++) sum += audioData[i];
                    const avg = sum / 50 / 255;
                    points.material.uniforms.audioBoost.value = avg;
                }
            }

            // ==================== ВХОД В 3D ====================
            go3dBtn.addEventListener('click', () => {
                if (!videoActive) {
                    alert('Камера ещё не запустилась, подождите');
                    return;
                }
                studio3d.classList.add('active');
                init3D();
            });

            backFrom3d.addEventListener('click', () => {
                studio3d.classList.remove('active');
                if (isRecording) stopRecording();
            });

            // ==================== ИСПРАВЛЕННАЯ ЗАПИСЬ ====================
            function startRecording() {
                if (!videoActive) {
                    alert('Нет видео с камеры');
                    return false;
                }

                recordedChunks = [];
                
                // Захватываем 3D канвас
                const videoStream = canvas3d.captureStream(30); // 30 fps
                
                // Добавляем аудио дорожку отдельно
                if (cameraStream) {
                    const audioTracks = cameraStream.getAudioTracks();
                    if (audioTracks.length > 0) {
                        videoStream.addTrack(audioTracks[0]);
                    }
                }

                // Проверяем поддержку кодеков
                let mimeType = 'video/webm';
                if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')) {
                    mimeType = 'video/webm;codecs=vp8,opus';
                } else if (MediaRecorder.isTypeSupported('video/webm')) {
                    mimeType = 'video/webm';
                }

                try {
                    mediaRecorder = new MediaRecorder(videoStream, {
                        mimeType: mimeType,
                        videoBitsPerSecond: 2500000, // 2.5 Mbps для хорошего качества
                        audioBitsPerSecond: 128000    // 128 kbps для аудио
                    });
                } catch (e) {
                    // Если не получается с заданными параметрами, пробуем без них
                    mediaRecorder = new MediaRecorder(videoStream);
                }

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    if (recordedChunks.length === 0) {
                        alert('Запись не удалась - нет данных');
                        return;
                    }

                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    
                    const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `camera_3d_${Date.now()}.webm`;
                    a.click();
                    
                    // Очистка
                    setTimeout(() => {
                        URL.revokeObjectURL(url);
                        recordedChunks = [];
                    }, 100);
                    
                    alert(`✅ Запись сохранена!\nДлительность: ${recordingSeconds} сек\nРазмер: ${sizeMB} МБ`);
                    
                    // Сброс состояния записи
                    isRecording = false;
                    recordBtn3d.classList.remove('recording');
                    recordBtn3d.innerHTML = '⏺';
                    recordIndicator3d.style.display = 'none';
                    
                    if (recordingTimer) {
                        clearInterval(recordingTimer);
                        recordingTimer = null;
                    }
                    recordingSeconds = 0;
                    timer3d.textContent = '00:00';
                };

                mediaRecorder.onerror = (e) => {
                    console.error('MediaRecorder error:', e);
                    alert('Ошибка записи: ' + e.error);
                    stopRecording();
                };

                // Запускаем запись
                mediaRecorder.start(1000); // Сохраняем каждую секунду
                isRecording = true;
                recordingSeconds = 0;
                
                recordBtn3d.classList.add('recording');
                recordBtn3d.innerHTML = '⏹';
                recordIndicator3d.style.display = 'block';
                audioQuality.innerHTML = '🎵 ЗАПИСЬ ...';
                
                // Таймер
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60);
                    const secs = recordingSeconds % 60;
                    timer3d.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }, 1000);
                
                return true;
            }

            function stopRecording() {
                if (mediaRecorder && isRecording) {
                    mediaRecorder.stop();
                    // Останавливаем треки стрима
                    if (mediaRecorder.stream) {
                        mediaRecorder.stream.getTracks().forEach(track => track.stop());
                    }
                }
            }

            recordBtn3d.addEventListener('click', () => {
                if (!videoActive) {
                    alert('Нет видео с камеры');
                    return;
                }
                
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });

            // ==================== АНИМАЦИЯ 3D ====================
            function animate3D() {
                if (!studio3d.classList.contains('active')) {
                    requestAnimationFrame(animate3D);
                    return;
                }
                
                requestAnimationFrame(animate3D);
                
                drawAudioVisualizer();
                
                if (controls) {
                    controls.update();
                }
                
                if (camera && renderer && scene) {
                    renderer.render(scene, camera);
                }
            }
            animate3D();

            // ==================== RESIZE ====================
            window.addEventListener('resize', () => {
                if (camera && renderer) {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }
                resizeCamera();
            });

            // ==================== ЗАПУСК ====================
            startFrontCamera();

            // Блокировка скролла в 3D
            document.addEventListener('touchmove', (e) => {
                if (studio3d.classList.contains('active')) {
                    e.preventDefault();
                }
            }, { passive: false });
        })();
    </script>
</body>
</html>
